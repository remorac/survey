<!DOCTYPE html>
<html data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Expert Judgment — Metaverse Readiness HEI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<link href="https://cdn.jsdelivr.net/npm/daisyui@5/daisyui.css" rel="stylesheet" type="text/css" />
<link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" type="text/css" />
<script src="config.js"></script>
<link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-base-200 text-base-content min-h-screen font-sans antialiased">

  <div class="drawer lg:drawer-open">
    <input id="drawer-toggle" type="checkbox" class="drawer-toggle" />

    <div class="drawer-content flex flex-col min-h-screen">
      <!-- Topbar -->
      <div class="navbar bg-base-100 border-b border-base-300 sticky top-0 z-40 px-4 lg:px-6 h-14 shrink-0">
        <div class="flex-none lg:hidden">
          <label for="drawer-toggle" class="btn btn-square btn-ghost btn-sm">
            <i data-lucide="menu" class="w-5 h-5"></i>
          </label>
        </div>
        <div class="flex-1 px-2 max-w-lg mx-auto w-full">
          <progress id="top-progress" class="progress progress-primary w-full h-1.5" value="0" max="100"></progress>
          <span id="top-label" class="text-[11px] text-base-content/50 font-semibold uppercase tracking-wider mt-1 block text-center"></span>
        </div>
      </div>

      <!-- Main Stage -->
      <main class="flex-1 p-5 lg:p-10 flex justify-start">
        <div id="app" class="w-full max-w-4xl"></div>
      </main>
    </div>

    <!-- Sidebar -->
    <div class="drawer-side z-50">
      <label for="drawer-toggle" class="drawer-overlay"></label>
      <aside class="menu bg-base-100 w-72 min-h-full border-r border-base-300 flex flex-col p-0">
        <!-- Brand -->
        <div class="p-5">
          <div class="flex items-center gap-3">
            <div class="w-9 h-9 rounded-lg bg-primary flex items-center justify-center text-primary-content shrink-0">
              <i data-lucide="shield-check" class="w-5 h-5"></i>
            </div>
            <div class="min-w-0">
              <div class="font-bold text-sm leading-tight truncate">Expert Judgment</div>
              <div class="text-[11px] text-base-content/50 font-medium truncate">Metaverse Readiness HEI</div>
            </div>
            <button id="btn-autofill" class="btn btn-ghost btn-sm btn-square ml-auto shrink-0 text-base-content/40 hover:text-base-content" title="Autofill all" onclick="autofillAll()">
              <i data-lucide="wand-sparkles" class="w-4 h-4"></i>
            </button>
          </div>
        </div>

        <!-- Nav -->
        <nav id="sidebar-nav" class="flex-1 p-2 overflow-y-auto"></nav>

        <!-- Footer -->
        <div class="p-4 border-t border-base-300 flex items-center gap-2">
          <div class="join shrink-0">
            <button id="btn-en" class="btn btn-xs join-item" onclick="setLang('en')">EN</button>
            <button id="btn-id" class="btn btn-xs join-item" onclick="setLang('id')">ID</button>
          </div>
          <select id="theme-select" class="select select-bordered select-xs w-full text-xs">
            <option value="light">Light</option>
            <option value="dark">Dark</option>
            <option value="corporate">Corporate</option>
            <option value="business">Business</option>
            <option value="nord">Nord</option>
            <option value="emerald">Emerald</option>
            <option value="sunset">Sunset</option>
            <option value="synthwave">Synthwave</option>
            <option value="dracula">Dracula</option>
            <option value="cupcake">Cupcake</option>
          </select>
        </div>
      </aside>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="fixed bottom-6 left-1/2 z-[60] opacity-0 pointer-events-none transition-all duration-300 translate-y-4 -translate-x-1/2"></div>

  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="js/app.js"></script>
</body>
</html>
